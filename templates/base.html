<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0e1418">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MUUC Portal">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}MUUC Upload Portal{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', path='/manifest.webmanifest') }}?v={{ asset_version() }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', path='/logo-circle.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/logo-circle.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v={{ asset_version() }}">
</head>
<body>
    <div class="site-shell">
        {% if request.session.get("role") %}
        <header class="topbar">
            <a class="brand" href="{{ '/admin' if request.session.get('role') == 'admin' else '/dashboard' }}">
                <span>MUUC Portal</span>
            </a>
            <div class="topbar-actions">
                <a class="button-link upload-pill" href="/upload">Upload</a>
                <div class="menu-wrap">
                <button class="menu-button" type="button" aria-expanded="false">Menu</button>
                <div class="menu-panel">
                    <a href="{{ '/admin' if request.session.get('role') == 'admin' else '/dashboard' }}">Main Page</a>
                    <a href="/summary">Summary Page</a>
                    <a href="/logout">Log Out</a>
                </div>
            </div>
            </div>
        </header>
        {% endif %}
        <main>
            {% if message %}
            <div class="flash">{{ message }}</div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <div class="zoom-modal" id="zoom-modal" hidden>
        <div class="zoom-modal-backdrop" data-zoom-close></div>
        <div class="zoom-modal-panel">
            <div class="zoom-toolbar">
                <button type="button" class="secondary zoom-button" data-zoom-out>-</button>
                <button type="button" class="secondary zoom-button" data-zoom-reset>100%</button>
                <button type="button" class="secondary zoom-button" data-zoom-in>+</button>
                <button type="button" class="ghost zoom-close" data-zoom-close>Close</button>
            </div>
            <div class="zoom-stage" data-zoom-stage></div>
        </div>
    </div>
    <script src="{{ url_for('static', path='/app.js') }}?v={{ asset_version() }}"></script>
</body>
</html>
