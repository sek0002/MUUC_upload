{% extends "base.html" %}

{% block title %}Upload Portal | MUUC Upload Portal{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Upload Portal</p>
    </div>
</section>

<form id="upload-form" action="/upload" method="post" enctype="multipart/form-data" class="upload-form">
    <input type="hidden" name="receipts_payload" id="receipts_payload">
    <div id="receipt-sections"></div>
    <p class="form-hint">You can add multiple receipt forms and upload multiple files in each form.</p>
    <div class="form-actions">
        <button type="button" class="secondary" id="add-receipt-button">Add Another Receipt</button>
        <button type="submit">Upload</button>
    </div>
</form>

<template id="receipt-template">
    <section class="receipt-block">
        <div class="receipt-block-header">
            <h2>Receipt <span class="receipt-number"></span></h2>
            <button type="button" class="ghost remove-receipt">Remove</button>
        </div>
        <div class="receipt-layout">
            <div class="receipt-fields">
                <label>Date</label>
                <input type="datetime-local" data-field="receipt_date" value="{{ current_datetime }}" required>

                <label>Upload one or more PDF/image files</label>
                <input type="file" data-field="files" accept=".pdf,image/*,.heic,.heif" multiple required>

                <label>Full Name</label>
                <input type="text" data-field="full_name" placeholder="Enter full name" required>

                <fieldset class="claim-grid">
                    <legend>Claim details</legend>
                    <label><input type="checkbox" value="Shore" data-claim> Shore</label>
                    <label><input type="checkbox" value="Boat" data-claim> Boat</label>
                    <label><input type="checkbox" value="Social" data-claim> Social</label>
                    <label><input type="checkbox" value="Gear purchase" data-claim> Gear purchase</label>
                    <label><input type="checkbox" value="Gear servicing" data-claim> Gear servicing</label>
                    <label><input type="checkbox" value="Car/Boat servicing" data-claim> Car/Boat servicing</label>
                    <label><input type="checkbox" value="Refund" data-claim> Refund</label>
                    <label><input type="checkbox" value="Gear deposit refund" data-claim> Gear deposit refund</label>
                    <label><input type="checkbox" value="Special Trips" data-claim> Special Trips</label>
                    <label><input type="checkbox" value="Courses" data-claim> Courses</label>
                    <label><input type="checkbox" value="Compressor" data-claim> Compressor</label>
                    <label><input type="checkbox" value="Fuel" data-claim> Fuel</label>
                    <label><input type="checkbox" value="Misc" data-claim> Misc</label>
                    <input type="text" data-field="misc_detail" placeholder="If Misc, type detail here">
                </fieldset>

                <label>Additional details</label>
                <textarea data-field="additional_details" rows="4" placeholder="Add any extra context"></textarea>

                <div class="bank-grid">
                    <div>
                        <label>BSB</label>
                        <input type="text" data-field="bsb" placeholder="Optional">
                    </div>
                    <div>
                        <label>ACC</label>
                        <input type="text" data-field="acc" placeholder="Optional">
                    </div>
                </div>

                <label>Value to claim</label>
                <input type="text" data-field="value_to_claim" inputmode="decimal" pattern="^[0-9]*[.,]?[0-9]{0,2}$" autocomplete="off" placeholder="Enter amount">
            </div>

            <aside class="receipt-preview-column">
                <div class="selected-preview-list selected-preview-square" data-preview-list hidden></div>
            </aside>
        </div>
    </section>
</template>
{% endblock %}
