{% extends "base.html" %}

{% block title %}Welcome | MUUC Upload Portal{% endblock %}

{% block content %}
<section class="hero">
    <div class="hero-copy">
        <p class="eyebrow">Receipt Upload Portal</p>
        <div class="pin-panel">
            <form action="/login" method="post" class="login-form">
                <label for="portal_type">Portal</label>
                <select id="portal_type" name="portal_type">
                    <option value="user">Upload Login</option>
                    <option value="admin">Admin Login</option>
                </select>

                <label for="pin">PIN / OTP</label>
                <input id="pin" name="pin" type="password" inputmode="numeric" placeholder="Upload PIN or admin OTP" required>

                <button type="submit">Enter Portal</button>
            </form>
            <a class="button-link secondary login-home-link" href="https://muuc.org.au">MUUC Home</a>
        </div>
    </div>
</section>
{% endblock %}
