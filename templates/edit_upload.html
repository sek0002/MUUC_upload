{% extends "base.html" %}

{% block title %}Edit Upload | MUUC Upload Portal{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="eyebrow">Admin Edit</p>
        <h1>Edit upload metadata</h1>
    </div>
    <a class="button-link" href="/admin">Back to Admin</a>
</section>

{% set claims = upload["claim_details"].split(", ") %}
<form action="/admin/upload/{{ upload['id'] }}/update" method="post" class="upload-form single-edit">
    <section class="receipt-block">
        <label>Date</label>
        <input type="datetime-local" name="receipt_date" value="{{ upload['receipt_date'][:16] }}" required>

        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ upload['full_name'] }}" required>

        <fieldset class="claim-grid">
            <legend>Claim details</legend>
            <label><input type="checkbox" name="claim_details" value="Shore" {% if "Shore" in claims %}checked{% endif %}> Shore</label>
            <label><input type="checkbox" name="claim_details" value="Boat" {% if "Boat" in claims %}checked{% endif %}> Boat</label>
            <label><input type="checkbox" name="claim_details" value="Social" {% if "Social" in claims %}checked{% endif %}> Social</label>
            <label><input type="checkbox" name="claim_details" value="Gear purchase" {% if "Gear purchase" in claims %}checked{% endif %}> Gear purchase</label>
            <label><input type="checkbox" name="claim_details" value="Gear servicing" {% if "Gear servicing" in claims %}checked{% endif %}> Gear servicing</label>
            <label><input type="checkbox" name="claim_details" value="Car/Boat servicing" {% if "Car/Boat servicing" in claims %}checked{% endif %}> Car/Boat servicing</label>
            <label><input type="checkbox" name="claim_details" value="Refund" {% if "Refund" in claims %}checked{% endif %}> Refund</label>
            <label><input type="checkbox" name="claim_details" value="Gear deposit refund" {% if "Gear deposit refund" in claims %}checked{% endif %}> Gear deposit refund</label>
            <label><input type="checkbox" name="claim_details" value="Special Trips" {% if "Special Trips" in claims %}checked{% endif %}> Special Trips</label>
            <label><input type="checkbox" name="claim_details" value="Courses" {% if "Courses" in claims %}checked{% endif %}> Courses</label>
            <label><input type="checkbox" name="claim_details" value="Compressor" {% if "Compressor" in claims %}checked{% endif %}> Compressor</label>
            <label><input type="checkbox" name="claim_details" value="Fuel" {% if "Fuel" in claims %}checked{% endif %}> Fuel</label>
            <label><input type="checkbox" name="claim_details" value="Misc" {% if "Misc" in claims %}checked{% endif %}> Misc</label>
            <input type="text" name="misc_detail" value="{{ upload['misc_detail'] or '' }}" placeholder="If Misc, type detail here">
        </fieldset>

        <label>Additional details</label>
        <textarea name="additional_details" rows="4">{{ upload["additional_details"] or "" }}</textarea>

        <div class="bank-grid">
            <div>
                <label>BSB</label>
                <input type="text" name="bsb" value="{{ upload['bsb'] or '' }}">
            </div>
            <div>
                <label>ACC</label>
                <input type="text" name="acc" value="{{ upload['acc'] or '' }}">
            </div>
        </div>

        <label>Value to claim</label>
        <input type="text" name="value_to_claim" value="{{ upload['value_to_claim'] or '' }}" inputmode="decimal" pattern="^[0-9]*[.,]?[0-9]{0,2}$" autocomplete="off">

        <label>Status</label>
        <select name="status">
            <option value="pending" {% if upload["status"] == "pending" %}selected{% endif %}>Pending</option>
            <option value="processed" {% if upload["status"] == "processed" %}selected{% endif %}>Processed</option>
            <option value="rejected" {% if upload["status"] == "rejected" %}selected{% endif %}>Rejected</option>
        </select>
    </section>

    <div class="form-actions">
        <button type="submit">Save Changes</button>
    </div>
</form>
{% endblock %}
